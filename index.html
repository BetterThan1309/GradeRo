<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>RO Grade Simulator</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2a2a40);
    display: flex;
    justify-content: center;
    padding: 20px;
    color: #eee;
}

.container {
    width: 100%;
    max-width: 480px;
    background: #2f2f46;
    padding: 20px;
    border-radius: 12px;
}

/* INPUT */
select, input[type="number"] {
    width: 100%;
    padding: 6px;
    border-radius: 6px;
    border: none;
    background: #1f1f2e;
    color: #fff;
    margin-top: 5px;
}

/* 🔥 FIX checkbox */
input[type="checkbox"] {
    width: auto;
    margin: 0;
    transform: scale(0.9);
}

/* MATERIAL */
.material-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    margin-top: 8px;
    background: #1f1f2e;
    border-radius: 6px;
    font-size: 13px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    margin-top: 10px;
    font-weight: bold;
}

.grade { background: #00c853; }
.reset { background: #d50000; }

/* RESULT */
.result {
    margin-top: 10px;
    padding: 8px;
    border-radius: 6px;
    text-align: center;
}
.success { background: #1b5e20; }
.fail { background: #b71c1c; }

/* 🔥 DUST FIX */
.dust-row {
    display: flex;
    align-items: flex-end;  /* 🔥 ทำให้ตรงกัน */
    gap: 10px;
    margin-top: 15px;
}

.dust-input {
    flex: 1;
}

/* 🔥 FIX BOX HEIGHT */
.event-box {
    display: flex;
    align-items: center;
    gap: 6px;

    height: 34px; /* 🔥 เท่ากับ input */
    padding: 0 10px;

    background: #1f1f2e;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}

/* SUMMARY */
.summary {
    margin-top: 20px;
    border-top: 1px solid #444;
    padding-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>RO Grade Simulator</h2>

<label>Grade</label>
<select id="currentGrade"></select>

<label>Refine</label>
<select id="refineLevel"></select>

<div id="materialOptions"></div>

<p>Zeny: <span id="zenyCost">0</span></p>
<p>Success Rate: <span id="successRate">0</span>%</p>

<div class="dust-row">
    <div class="dust-input">
        <label>Blessed Dust</label>
        <input type="number" id="dust" value="0">
    </div>

    <label class="event-box">
        <input type="checkbox" id="event">
        +10%
    </label>
</div>

<button class="grade" onclick="simulate()">GRADE</button>

<div class="result" id="result"></div>

<div class="summary">
    <h3>📦 สรุปวัตถุดิบ</h3>
    <p>Zeny รวม: <span id="totalZeny">0</span></p>
    <p>Blessed Dust: <span id="totalDust">0</span></p>
    <ul id="totalMaterials"></ul>

    <button class="reset" onclick="resetAll()">รีเซ็ต</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
